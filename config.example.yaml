# =====================================================================
#  Claude Portfolio Watchdog — пример конфигурации
# =====================================================================
#  Скопируй этот файл в config.yaml и подставь свои значения.
#  Секреты (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, CLAUDE_API_KEY)
#  через config НЕ передаются — они читаются из переменных окружения
#  (локально из .env, в GitHub Actions — из Repository Secrets).
# =====================================================================

# === ТИКЕРЫ ===
# Если папка portfolio/ пустая (нет CSV-выгрузки из IBKR),
# система будет следить за этими тикерами.
# Если CSV есть — этот список служит только подсказкой / fallback'ом.
tickers:
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - META
  - TSLA
  - SPY

# === МОНИТОРИНГ ===
# Включи/выключи отслеживание разных типов сигналов.
# Каждый тип использует свои источники данных.
monitoring:
  # Инсайдерские сделки топ-менеджеров (SEC Form 4).
  # Бесплатно, источник: data.sec.gov
  insider_trades: true
  # Изменения рейтингов крупных банков (Goldman, MS, JPM ...).
  # Источник: yfinance
  analyst_ratings: true
  # Резкие движения цены (порог настраивается ниже).
  price_movements: true
  # Новости по портфельным тикерам, отфильтрованные Claude'ом.
  news: true
  # Earnings-календарь (за 1–3 дня + день публикации).
  earnings: true
  # Макро-события (FOMC, CPI, PPI, NFP, GDP).
  macro: true
  # VIX, sector rotation, корреляции внутри портфеля.
  volatility: true

# === ПОРОГИ ТРИГГЕРОВ ===
thresholds:
  # Дневное изменение цены в %, начиная с которого присылается алерт.
  # 3–5% = medium, 5–10% = high, >10% = critical.
  price_movement_percent: 3.0
  # Минимальный score важности новости (1–10) от Claude, чтобы пересылать.
  # 7 — разумный дефолт. Поставь 8, если шума много.
  news_importance_min: 7
  # Минимальная сумма инсайдерской сделки (USD), ниже игнорируем.
  insider_min_value_usd: 1000000
  # Уровень VIX, при превышении которого считаем "повышенный страх".
  vix_alert_level: 25.0
  # За сколько дней до earnings слать первое уведомление.
  earnings_days_before: 3

# === РАСПИСАНИЕ (cron в UTC) ===
# GitHub Actions работает только в UTC. Все cron-выражения здесь — UTC.
schedule:
  # Мониторинг сигналов: каждый час в торговое время США (13–20 UTC), будни.
  monitor_interval: "0 13-20 * * 1-5"
  # Утренняя сводка: 06:00 UTC = 09:00 МСК, будни.
  daily_summary: "0 6 * * 1-5"
  # Еженедельный PDF: воскресенье 17:00 UTC = 20:00 МСК.
  weekly_report: "0 17 * * 0"

# === НАСТРОЙКИ ОТЧЁТОВ ===
reports:
  # Язык всех уведомлений и PDF: ru | en
  language: ru
  # IANA-таймзона, в которой отображаются даты в отчётах.
  timezone: Europe/Moscow
  # Базовая валюта для итоговой стоимости и P&L.
  currency: USD
  # Бенчмарк для сравнения портфеля (на графике performance vs benchmark).
  benchmark: SPY

# === CLAUDE ===
claude:
  # ID модели. При обновлении меняй здесь — больше нигде менять не нужно.
  model: claude-sonnet-4-20250514
  # Стиль аналитических наблюдений: professional | casual | detailed
  insights_style: professional

# === PDF ===
pdf:
  # Тема оформления PDF: dark | light
  theme: dark
  # Акцентный цвет (hex). По умолчанию #00d4ff (cyan).
  accent_color: "#00d4ff"
