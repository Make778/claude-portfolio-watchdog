name: Weekly Report

on:
  schedule:
    # Воскресенье 17:00 UTC = 20:00 МСК.
    - cron: '0 17 * * 0'
  workflow_dispatch:

concurrency:
  group: portfolio-weekly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # PDF-генерация может быть долгой при многих позициях

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly PDF report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python -m src.main --task=weekly

      - name: Archive PDF in repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports_archive/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: archive weekly report [skip ci]"
          git push || true

      - name: Upload PDF as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: data/reports_archive/*.pdf
          retention-days: 90
