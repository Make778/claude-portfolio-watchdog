name: Portfolio Monitor

on:
  schedule:
    # Каждый час в торговое время США (13:00–20:00 UTC), будни.
    - cron: '0 13-20 * * 1-5'
  workflow_dispatch:

# Не запускаем параллельно — иначе будут конфликты при коммите state-файлов.
concurrency:
  group: portfolio-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitoring
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python -m src.main --task=monitor

      - name: Commit updated state
        # Сохраняем sent_signals / news_cache / cik_cache, чтобы дедупликация
        # сохранялась между запусками. Если ничего не изменилось — git
        # вернёт ненулевой код, но `|| true` подавит ошибку.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sent_signals.json data/news_cache.json data/cik_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push || true
